<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Slimeopolis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script>tailwind.config={theme:{extend:{fontFamily:{display:["Playfair Display","serif"],body:["Inter","sans-serif"]},colors:{slime:{500:"#22c55e",600:"#16a34a",400:"#4ade80"}}}}}</script>
</head>
<body class="font-body bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-6">
        <span class="text-3xl">🫧</span>
        <span class="font-display font-black text-2xl">Slimeopolis</span>
      </a>
    </div>

    <!-- Tab switcher -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="flex border-b border-gray-100">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-4 text-sm font-semibold text-gray-900 border-b-2 border-gray-900 transition-all">
          Sign In
        </button>
        <button id="tab-register" onclick="switchTab('register')"
          class="flex-1 py-4 text-sm font-medium text-gray-400 hover:text-gray-600 border-b-2 border-transparent transition-all">
          Create Account
        </button>
      </div>

      <!-- Login Form — POST /api/auth/login (rate limiting + schema validation target) -->
      <div id="form-login" class="p-8">
        <form id="login-form" class="space-y-5" novalidate>
          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Email</label>
            <input type="email" name="email" required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-slime-400 bg-gray-50"
              placeholder="you@example.com" autocomplete="email" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Password</label>
            <input type="password" name="password" required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-slime-400 bg-gray-50"
              placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-4 py-2.5"></div>
          <button type="submit"
            class="w-full bg-gray-900 text-white py-3 rounded-xl text-sm font-semibold hover:bg-slime-600 transition-colors">
            Sign In
          </button>
        </form>
      </div>

      <!-- Register Form — POST /api/auth/register (rate limiting + schema validation target) -->
      <div id="form-register" class="p-8 hidden">
        <form id="register-form" class="space-y-5" novalidate>
          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Full Name</label>
            <input type="text" name="name" required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-slime-400 bg-gray-50"
              placeholder="Jane Doe" autocomplete="name" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Email</label>
            <input type="email" name="email" required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-slime-400 bg-gray-50"
              placeholder="you@example.com" autocomplete="email" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Password</label>
            <input type="password" name="password" required minlength="8"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-slime-400 bg-gray-50"
              placeholder="Min. 8 characters" autocomplete="new-password" />
          </div>
          <div id="register-error" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-4 py-2.5"></div>
          <button type="submit"
            class="w-full bg-gray-900 text-white py-3 rounded-xl text-sm font-semibold hover:bg-slime-600 transition-colors">
            Create Account
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      By signing in, you agree this is an API Shield demo app.
    </p>
  </div>

  <script src="/assets/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = "/";

    function switchTab(tab) {
      const isLogin = tab === "login";
      document.getElementById("form-login").classList.toggle("hidden", !isLogin);
      document.getElementById("form-register").classList.toggle("hidden", isLogin);
      document.getElementById("tab-login").className = `flex-1 py-4 text-sm font-semibold transition-all border-b-2 ${isLogin ? "text-gray-900 border-gray-900" : "text-gray-400 hover:text-gray-600 border-transparent"}`;
      document.getElementById("tab-register").className = `flex-1 py-4 text-sm font-semibold transition-all border-b-2 ${!isLogin ? "text-gray-900 border-gray-900" : "text-gray-400 hover:text-gray-600 border-transparent"}`;
    }

    // Check URL param
    if (new URLSearchParams(window.location.search).get("tab") === "register") switchTab("register");

    // Login form
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button[type=submit]");
      const errEl = document.getElementById("login-error");
      const data = new FormData(e.target);

      btn.textContent = "Signing in...";
      btn.disabled = true;
      errEl.classList.add("hidden");

      const { status, data: res } = await api.post("/auth/login", {
        email: data.get("email"),
        password: data.get("password"),
      });

      if (status === 200 && res.success) {
        Auth.setSession(res.data.token, res.data.user);
        showToast("Welcome back! 🫧", "success");
        setTimeout(() => window.location.href = "/products.html", 600);
      } else {
        errEl.textContent = res.error?.message ?? "Sign in failed";
        errEl.classList.remove("hidden");
        btn.textContent = "Sign In";
        btn.disabled = false;
      }
    });

    // Register form
    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button[type=submit]");
      const errEl = document.getElementById("register-error");
      const data = new FormData(e.target);

      btn.textContent = "Creating account...";
      btn.disabled = true;
      errEl.classList.add("hidden");

      const { status, data: res } = await api.post("/auth/register", {
        email: data.get("email"),
        password: data.get("password"),
        name: data.get("name"),
      });

      if ((status === 200 || status === 201) && res.success) {
        Auth.setSession(res.data.token, res.data.user);
        showToast("Account created! Welcome to Slimeopolis 🫧", "success");
        setTimeout(() => window.location.href = "/products.html", 600);
      } else {
        errEl.textContent = res.error?.message ?? "Registration failed";
        errEl.classList.remove("hidden");
        btn.textContent = "Create Account";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
